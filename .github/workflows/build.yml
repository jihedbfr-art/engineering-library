name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      dirs: ${{ steps.find.outputs.dirs }}
    steps:
      - uses: actions/checkout@v7

      - name: Find Maven project directories
        id: find
        run: |
          # A directory is a buildable root only if no ancestor directory also has a pom.xml.
          # This builds each multi-module reactor once through its parent, instead of trying to
          # build reactor submodules on their own (they can't resolve their sibling modules).
          all=$(find . -name pom.xml -not -path '*/target/*' -exec dirname {} \; | sed 's#^\./##' | sort -u)
          roots=""
          while IFS= read -r d; do
            [ -z "$d" ] && continue
            parent=$(dirname "$d")
            is_child=false
            while [ "$parent" != "." ]; do
              if printf '%s\n' "$all" | grep -qxF "$parent"; then is_child=true; break; fi
              parent=$(dirname "$parent")
            done
            [ "$is_child" = false ] && roots="$roots$d"$'\n'
          done <<< "$all"
          dirs=$(printf '%s' "$roots" | sed '/^$/d' | jq -R -s -c 'split("\n")[:-1]')
          echo "dirs=$dirs" >> "$GITHUB_OUTPUT"
          echo "Root project directories: $dirs"

  build:
    needs: discover
    if: needs.discover.outputs.dirs != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.discover.outputs.dirs) }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test ${{ matrix.project }}
        working-directory: ${{ matrix.project }}
        run: mvn -B clean verify

      - name: Compute artifact slug
        id: slug
        if: always()
        run: echo "slug=$(echo '${{ matrix.project }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Upload JaCoCo report (${{ matrix.project }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-${{ steps.slug.outputs.slug }}
          path: ${{ matrix.project }}/target/site/jacoco/
          if-no-files-found: ignore

      - name: Upload surefire reports on failure (${{ matrix.project }})
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-${{ steps.slug.outputs.slug }}
          path: ${{ matrix.project }}/target/surefire-reports/
