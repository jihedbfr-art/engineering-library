name: No AI Traces Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for CLAUDE.md / .claude/ in the tracked tree
        run: |
          matches=$(git ls-files | grep -E '(^|/)CLAUDE\.md$|(^|/)\.claude/' || true)
          if [ -n "$matches" ]; then
            echo "Found local-only files that should never be committed to this public repo:"
            echo "$matches"
            exit 1
          fi
          echo "Clean."

      - name: Check commit messages for AI attribution
        run: |
          range="${{ github.event.pull_request.base.sha || github.event.before }}..${{ github.sha }}"
          if ! git rev-parse --verify "${{ github.event.pull_request.base.sha || github.event.before }}" >/dev/null 2>&1; then
            range="${{ github.sha }}"
          fi
          hits=$(git log --format='%H %s%n%b' "$range" 2>/dev/null | grep -iE 'co-authored-by:\s*claude|generated by (claude|anthropic)' || true)
          if [ -n "$hits" ]; then
            echo "Commit message mentions AI authorship, which shouldn't land in this repo's history:"
            echo "$hits"
            exit 1
          fi
          echo "Clean."
