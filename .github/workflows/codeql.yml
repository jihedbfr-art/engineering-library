name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 3 * * 1'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['java-kotlin']

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Compile every Maven project
        # No single root aggregator pom here (each tier's project is its own standalone
        # pom.xml), so CodeQL's generic autobuilder won't find them all - compile each one
        # explicitly instead. The CodeQL tracer picks up these javac invocations regardless.
        run: |
          for dir in $(find . -name pom.xml -not -path '*/target/*' -exec dirname {} \;); do
            echo "Compiling $dir"
            (cd "$dir" && mvn -B -q clean compile)
          done

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
