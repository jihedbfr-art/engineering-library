<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Habit Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>Suivi d'habitudes</h1>
    <form id="habit-form">
      <input type="text" id="habit-name" placeholder="Nouvelle habitude (ex: Sport)" required>
      <button type="submit">Ajouter</button>
    </form>
    <div id="habit-list"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
