<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><title>Regex Playground</title>
<style>body{font-family:system-ui;max-width:700px;margin:30px auto}input,textarea{width:100%;padding:8px;box-sizing:border-box;margin:6px 0;font-family:monospace}mark{background:#ffe066}</style>
</head><body>
<h1>Regex Playground</h1>
<input id="pattern" placeholder="Pattern (ex: \d+)" value="\d+">
<input id="flags" placeholder="Flags (ex: g, gi)" value="g">
<textarea id="text" rows="6">Commande #42 pour un montant de 150 euros, reference REF-2026-007.</textarea>
<h3>Resultat (<span id="count">0</span> match)</h3>
<div id="output" style="white-space:pre-wrap;border:1px solid #ddd;padding:10px"></div>
<script src="app.js"></script>
</body></html>
