<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><title>Visualiseur de logs</title>
<style>
body{font-family:system-ui;margin:0;padding:16px}
input,select{padding:6px;margin-right:8px}
#logs{margin-top:12px;font-family:monospace;font-size:0.9em}
.line{padding:2px 6px;border-radius:3px}
.ERROR{background:#ffe0e0}
.WARN{background:#fff3cd}
.INFO{background:#e6f4ea}
</style>
</head><body>
<h1>Visualiseur de logs</h1>
<input type="file" id="fileInput" accept=".log,.txt">
<select id="levelFilter">
  <option value="">Tous les niveaux</option>
  <option value="ERROR">ERROR</option>
  <option value="WARN">WARN</option>
  <option value="INFO">INFO</option>
</select>
<input id="search" placeholder="Filtrer par texte...">
<div id="logs"></div>
<script src="app.js"></script>
</body></html>
