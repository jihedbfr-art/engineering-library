<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pastebin Clone</title>
<style>
  body { font-family: system-ui, Arial, sans-serif; background: #f4f5f7; margin: 0; display: flex; justify-content: center; padding: 40px 16px; }
  .app { background: #fff; border-radius: 8px; padding: 24px; width: 100%; max-width: 600px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  h1 { margin-top: 0; font-size: 1.4rem; }
  textarea { width: 100%; min-height: 160px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; margin-bottom: 8px; }
  button { padding: 8px 14px; border: none; background: #2563eb; color: #fff; border-radius: 4px; cursor: pointer; }
  #result { margin-top: 12px; }
  #result a { word-break: break-all; }
  #view-box { margin-top: 20px; padding-top: 16px; border-top: 1px solid #eee; }
  #view-box input { width: 70%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
  pre { background: #f4f5f7; padding: 12px; border-radius: 4px; white-space: pre-wrap; word-break: break-word; }
</style>
</head>
<body>
  <div class="app">
    <h1>Pastebin Clone</h1>
    <form id="paste-form">
      <textarea id="text" placeholder="Colle ton texte ici..." required></textarea>
      <button type="submit">Créer le paste</button>
    </form>
    <div id="result"></div>

    <div id="view-box">
      <h2 style="font-size:1.1rem;">Consulter un paste</h2>
      <input type="text" id="paste-id" placeholder="ID du paste (ex: aB3xY9)">
      <button id="view-btn">Voir</button>
      <pre id="paste-content"></pre>
    </div>
  </div>
  <script>
    document.getElementById('paste-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = document.getElementById('text').value;
      const res = await fetch('/paste', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      const data = await res.json();
      const url = window.location.origin + '/paste/' + data.id;
      document.getElementById('result').innerHTML =
        `Paste créé : <a href="${url}" target="_blank">${url}</a> (id: ${data.id})`;
    });

    document.getElementById('view-btn').addEventListener('click', async () => {
      const id = document.getElementById('paste-id').value.trim();
      if (!id) return;
      const res = await fetch('/paste/' + id);
      const contentEl = document.getElementById('paste-content');
      if (!res.ok) {
        contentEl.textContent = 'Paste introuvable.';
        return;
      }
      const data = await res.json();
      contentEl.textContent = data.text;
    });
  </script>
</body>
</html>
