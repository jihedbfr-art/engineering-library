<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Notes</title>
<style>
  body { font-family: system-ui, Arial, sans-serif; background: #f4f5f7; margin: 0; display: flex; justify-content: center; padding: 40px 16px; }
  .app { background: #fff; border-radius: 8px; padding: 24px; width: 100%; max-width: 520px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  h1 { margin-top: 0; font-size: 1.4rem; }
  input, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 8px; font-family: inherit; }
  textarea { min-height: 70px; }
  button { padding: 8px 14px; border: none; background: #2563eb; color: #fff; border-radius: 4px; cursor: pointer; }
  .note { border-bottom: 1px solid #eee; padding: 10px 0; }
  .note h3 { margin: 0 0 4px; }
  .note p { margin: 0 0 6px; white-space: pre-wrap; color: #444; }
  .note button { background: transparent; color: #d33; padding: 2px 6px; }
</style>
</head>
<body>
  <div class="app">
    <h1>Notes</h1>
    <form id="note-form">
      <input type="text" id="title" placeholder="Titre" required>
      <textarea id="content" placeholder="Contenu"></textarea>
      <button type="submit">Ajouter la note</button>
    </form>
    <div id="notes-list"></div>
  </div>
  <script>
    const form = document.getElementById('note-form');
    const list = document.getElementById('notes-list');

    async function loadNotes() {
      const res = await fetch('/notes');
      const notes = await res.json();
      list.innerHTML = '';
      notes.forEach(n => {
        const div = document.createElement('div');
        div.className = 'note';
        div.innerHTML = `<h3>${escapeHtml(n.title)}</h3><p>${escapeHtml(n.content)}</p>`;
        const del = document.createElement('button');
        del.textContent = 'Supprimer';
        del.onclick = async () => {
          await fetch('/notes/' + n.id, { method: 'DELETE' });
          loadNotes();
        };
        div.appendChild(del);
        list.appendChild(div);
      });
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('title').value.trim();
      const content = document.getElementById('content').value.trim();
      if (!title) return;
      await fetch('/notes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content })
      });
      form.reset();
      loadNotes();
    });

    loadNotes();
  </script>
</body>
</html>
