<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><title>Dashboard Feature Flags</title>
<style>
body{font-family:system-ui;max-width:500px;margin:30px auto}
.flag{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #eee}
.switch{width:44px;height:24px;background:#ccc;border-radius:12px;position:relative;cursor:pointer;transition:.2s}
.switch.on{background:#40c463}
.switch::after{content:"";position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:3px;left:3px;transition:.2s}
.switch.on::after{left:23px}
</style>
</head><body>
<h1>Feature Flags</h1>
<div id="flags"></div>
<script src="app.js"></script>
</body></html>
