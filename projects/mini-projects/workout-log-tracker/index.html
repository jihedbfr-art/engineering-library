<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><title>Journal d'entrainement</title>
<style>body{font-family:system-ui;max-width:600px;margin:30px auto}input{padding:6px;margin:2px}table{width:100%;border-collapse:collapse;margin-top:16px}td,th{border:1px solid #ddd;padding:6px}button{padding:6px 12px;cursor:pointer}</style>
</head><body>
<h1>Journal d'entrainement</h1>
<input id="exercise" placeholder="Exercice">
<input id="weight" type="number" placeholder="Poids (kg)">
<input id="reps" type="number" placeholder="Repetitions">
<button id="add">Ajouter</button>
<table id="log"><thead><tr><th>Date</th><th>Exercice</th><th>Poids</th><th>Reps</th><th>Volume</th></tr></thead><tbody></tbody></table>
<script src="app.js"></script>
</body></html>
