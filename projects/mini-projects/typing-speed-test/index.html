<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test de vitesse de frappe</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Test de vitesse de frappe</h1>
  <p id="prompt-text"></p>
  <textarea id="input-area" rows="4" placeholder="Tapez le texte ci-dessus ici..."></textarea>
  <div id="stats">
    <span>Temps : <b id="time">0</b>s</span>
    <span>MPM : <b id="wpm">0</b></span>
    <span>Precision : <b id="accuracy">100</b>%</span>
  </div>
  <button id="restart">Recommencer</button>
  <script src="app.js"></script>
</body>
</html>
