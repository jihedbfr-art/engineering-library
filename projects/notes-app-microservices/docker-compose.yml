version: "3.8"

# Stack Evernote-like (jihedapps) — ports décalés pour éviter les conflits avec d'autres stacks locales
services:
  postgres:
    image: postgres:16.2
    container_name: notesapp-postgres
    environment:
      POSTGRES_DB: notesapp
      POSTGRES_USER: notesapp
      POSTGRES_PASSWORD: notesapp
    ports:
      - "5433:5432"
    volumes:
      - notesapp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notesapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: notesapp-keycloak
    command: start-dev --import-realm --http-port=8090
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8090:8090"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: notesapp-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    ports:
      - "9094:9094"

  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    container_name: notesapp-minio
    command: server /data --console-address ":9101"
    environment:
      MINIO_ROOT_USER: notesapp
      MINIO_ROOT_PASSWORD: notesapp123
    ports:
      - "9100:9000"
      - "9101:9101"
    volumes:
      - notesapp_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  discovery:
    build: ./discovery-server
    container_name: notesapp-discovery
    ports:
      - "8762:8762"

  backend:
    build: ./backend
    container_name: notesapp-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/notesapp
      SPRING_DATASOURCE_USERNAME: notesapp
      SPRING_DATASOURCE_PASSWORD: notesapp
      KEYCLOAK_JWK_SET_URI: http://keycloak:8090/realms/notesapp/protocol/openid-connect/certs
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery:8762/eureka/
      MINIO_URL: http://minio:9000
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_started
      discovery:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: notesapp-frontend
    ports:
      - "4300:80"
    depends_on:
      - backend

volumes:
  notesapp_postgres_data:
  notesapp_minio_data:
