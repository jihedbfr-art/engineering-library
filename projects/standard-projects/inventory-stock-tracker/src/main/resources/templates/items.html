<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Stock</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 960px; margin: 40px auto; color: #222; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #ddd; }
        tr.low-stock { background: #fef2f2; }
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 12px; color: #fff; }
        .badge-low { background: #dc2626; }
        .badge-ok { background: #16a34a; }
        a { color: #2563eb; text-decoration: none; }
    </style>
</head>
<body>
<h1>Articles en stock</h1>
<table>
    <thead>
    <tr><th>SKU</th><th>Nom</th><th>Categorie</th><th>Quantite</th><th>Seuil reappro</th><th>Etat</th></tr>
    </thead>
    <tbody>
    <tr th:each="item : ${items}" th:classappend="${item.lowStock} ? 'low-stock' : ''">
        <td th:text="${item.sku}">SKU-001</td>
        <td><a th:href="@{/items/{id}(id=${item.id})}" th:text="${item.name}">Nom</a></td>
        <td th:text="${item.category}">Categorie</td>
        <td th:text="${item.quantity}">0</td>
        <td th:text="${item.reorderThreshold}">0</td>
        <td>
            <span th:if="${item.lowStock}" class="badge badge-low">A reapprovisionner</span>
            <span th:unless="${item.lowStock}" class="badge badge-ok">OK</span>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(items)}">
        <td colspan="6">Aucun article. Passez par l'API REST (<code>POST /api/items</code>) pour en creer un.</td>
    </tr>
    </tbody>
</table>
</body>
</html>
